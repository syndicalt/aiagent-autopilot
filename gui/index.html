<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autopilot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="status-row">
        <div class="status-badge" id="status-badge">Stopped</div>
        <div class="status-badge smart-sort" id="smart-sort-badge">Smart Sort: Setting up...</div>
      </div>
      <h1>Autopilot</h1>
      <p class="subtitle">Your Downloads agent</p>
    </header>

    <section class="controls">
      <button id="btn-start" class="btn primary">Start Agent</button>
      <button id="btn-stop" class="btn danger" disabled>Stop Agent</button>
      <label class="switch-label" id="mute-switch-label">
        <input type="checkbox" id="mute-switch">
        <span class="switch-slider"></span>
        <span class="switch-text">Mute</span>
      </label>
    </section>

    <section class="card rules" id="rules-section">
      <div class="card-header">
        <h2>Sort Rules</h2>
        <button id="btn-add-rule" class="btn ghost">+ Add Rule</button>
      </div>
      <div id="rules-list" class="rules-list"></div>

      <div class="rule-test-row">
        <input type="text" id="test-filename" class="test-input" placeholder="Test filename (e.g. invoice_2024.pdf)" />
        <button id="btn-test-rules" class="btn ghost">Test</button>
      </div>
      <div id="test-results" class="test-results"></div>

      <button id="btn-save-rules" class="btn primary" style="width:100%; margin-top:16px;">Save Rules</button>
    </section>

    <section class="card actions">
      <div class="card-header">
        <h2>Recent Actions</h2>
        <button id="btn-refresh" class="btn ghost">Refresh</button>
      </div>
      <ul id="action-list" class="action-list">
        <li class="empty">No actions yet.</li>
      </ul>
      <button id="btn-undo" class="btn secondary" disabled>Undo Last</button>
    </section>

    <section class="card logs" id="logs-section" style="display:none;">
      <div class="card-header">
        <h2>Agent Logs</h2>
        <button id="btn-hide-logs" class="btn ghost">Hide</button>
      </div>
      <pre id="log-output" class="log-output"></pre>
    </section>

    <footer>
      <p>Runs in the background. Click the tray icon to hide or show.</p>
      <button id="btn-logs" class="btn ghost">View Logs</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
